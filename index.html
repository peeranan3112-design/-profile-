<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ส่วนตัวของฉัน</title>
    <style>
        /* ตั้งค่าฟอนต์และพื้นหลัง */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* การ์ดโปรไฟล์ */
        .profile-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }

        /* รูปโปรไฟล์ */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #007bff;
            margin-bottom: 20px;
        }

        /* หัวข้อชื่อ */
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            color: #222;
        }

        /* ตำแหน่งงานหรือสโลแกน */
        .title {
            font-size: 16px;
            color: #007bff;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* เส้นคั่น */
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        /* ส่วนข้อมูลประวัติ */
        .bio {
            font-size: 15px;
            line-height: 1.6;
            color: #666;
            text-align: left;
        }

        .bio h3 {
            color: #333;
            margin-bottom: 10px;
        }

        /* ส่วนข้อมูลติดต่อ */
        .contact-info {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
        }

        .contact-item {
            margin-bottom: 8px;
        }

        .contact-item strong {
            color: #555;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="./S__26148866.jpg" alt="รูปโปรไฟล์ของฉัน" class="profile-img">
        
        <h1>พีรนันท์ เฉิดดิลก</h1>
        <div class="title"> STUDENT</div>
        
        <hr>
        
        <div class="bio">
            <h3>เกี่ยวกับฉัน (About Me)</h3>
            <p>สวัสดีค่ะ หนูเป็นนักศึกษามหาวิทยาลัยกาฬสินธุ์ คณะวิสวกรรม สาขา คอมพิวเตอร์ ยินดีที่ได้รู้จักทุกคนค่ะ </p>
        </div>
        
        <hr>
        
        <div class="contact-info">
            <h3>ข้อมูลการติดต่อ (Contact)</h3>
            <div class="contact-item"><strong>อีเมล:</strong> peeranan3112@gmail.com</div>
            <div class="contact-item"><strong>เบอร์โทร:</strong> 065-113-1038</div>
            <div class="contact-item"><strong>ที่อยู่:</strong> กาฬสินธุ์, ประเทศไทย</div>
        </div>
    </div>

</body>
</html>
